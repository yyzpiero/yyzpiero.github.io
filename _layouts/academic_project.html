---
layout: default
---
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/academic-home.css' | relative_url }}">

<div class="academic-home academic-subpage">
  {% include academic_nav.html %}

  <main class="shell post-shell">
    <article class="post-article">
      <header class="post-heading">
        <a class="back-link" href="{{ '/#projects' | relative_url }}">Projects</a>
        <h1>{{ page.title }}</h1>
        {% if page.subtitle %}
          <p class="subtitle">{{ page.subtitle }}</p>
        {% endif %}
      </header>
      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </main>
</div>
